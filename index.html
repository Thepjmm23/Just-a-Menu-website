<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Just A Menu | Gorilla Tag</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom organic animations */
        @keyframes float-organic {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-20px) scale(1.02); }
        }
        @keyframes subtle-drift {
            0% { transform: translate(-50%, -50%) scale(1); }
            33% { transform: translate(-48%, -52%) scale(1.02); }
            66% { transform: translate(-52%, -49%) scale(0.98); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }
        @keyframes enter-up {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .organic-float {
            /* Smoother, gentler, strictly up and down movement */
            animation: float-organic 4s cubic-bezier(0.445, 0.05, 0.55, 0.95) infinite;
        }
        .organic-glow {
            animation: subtle-drift 15s ease-in-out infinite;
        }
        .animate-enter {
            opacity: 0;
            animation: enter-up 0.9s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-300 { animation-delay: 300ms; }
    </style>
</head>
<body class="bg-[#050505] text-white font-sans min-h-screen flex flex-col items-center justify-center relative overflow-hidden selection:bg-white selection:text-black">

    <!-- Ambient Background Glow -->
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-white/5 rounded-full blur-[120px] pointer-events-none organic-glow z-0"></div>
    <div class="absolute top-0 left-0 w-full h-full bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAiIGhlaWdodD0iMjAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGNpcmNsZSBjeD0iMSIgY3k9EiIHI9IjEiIGZpbGw9InJnYmEoMjU1LDI1NSwyNTUsMC4wNSkiLz48L3N2Zz4=')] opacity-50 z-0"></div>

    <!-- Main Content Container -->
    <main class="relative z-10 flex flex-col items-center text-center px-6 w-full max-w-4xl pb-24 min-h-[500px] justify-center">
        
        <!-- HOME VIEW -->
        <div id="view-home" class="view-section flex flex-col items-center w-full transition-all duration-500 ease-out opacity-100 scale-100">
            <!-- Logo Section -->
            <!-- The animate-enter handles the fade-in, the inner div handles the gentle float -->
            <div class="mb-6 animate-enter">
                <div class="organic-float">
                    <!-- Image tag for easy logo replacement. Updated class rounded-2xl for smooth rounded corners -->
                    <img src="logo.png" alt="Just A Menu Logo" class="w-[180px] h-[180px] object-cover rounded-[2rem] drop-shadow-[0_0_20px_rgba(255,255,255,0.15)]" onerror="this.onerror=null; this.src='data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTgwIiBoZWlnaHQ9IjE4MCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iMTgwIiBoZWlnaHQ9IjE4MCIgZmlsbD0iIzMzMyIgcng9IjMyIi8+PHRleHQgeD0iOTAiIHk9IjEwMCIgZm9udC1mYW1pbHk9InNhbnMtc2VyaWYiIGZvbnQtc2l6ZT0iMjQiIGZpbGw9IiNmZmYiIHRleHQtYW5jaG9yPSJtaWRkbGUiPkxvZ288L3RleHQ+PC9zdmc+'">
                </div>
            </div>

            <!-- Title -->
            <h1 class="text-4xl md:text-7xl font-extrabold tracking-tighter mb-6 w-full text-white drop-shadow-[0_0_15px_rgba(255,255,255,0.2)] animate-enter delay-100 leading-tight">
                JUST A MENU
            </h1>

            <!-- Subtitle -->
            <div class="mb-12 animate-enter delay-200 px-4">
                <p class="text-gray-300 text-lg md:text-xl font-medium whitespace-nowrap">
                    The cleanest and most powerful mod menu for Gorilla Tag
                </p>
                <p class="text-gray-400 text-lg md:text-xl mt-1">
                    Join the discord to stay updated.
                </p>
            </div>

            <a href="https://discord.gg/rEF35tFjwu" target="_blank" rel="noopener noreferrer" 
               class="group relative inline-flex items-center justify-center gap-3 px-8 py-4 bg-white text-black font-bold text-lg rounded-xl overflow-hidden transition-all duration-300 hover:scale-105 active:scale-95 hover:bg-gray-200 shadow-[0_0_20px_rgba(255,255,255,0.15)] hover:shadow-[0_0_30px_rgba(255,255,255,0.3)] animate-enter delay-300">
                <div class="absolute inset-0 w-full h-full bg-black/10 -translate-x-full group-hover:animate-[shimmer_1.5s_infinite] skew-x-12"></div>
                <span class="relative z-10">Join the Discord</span>
            </a>
        </div>

        <!-- DEVS VIEW -->
        <div id="view-devs" class="view-section hidden flex-col items-center w-full transition-all duration-500 ease-out opacity-0 scale-[0.98] absolute">
            <h2 class="text-4xl md:text-6xl font-extrabold tracking-tighter mb-8 w-full text-white drop-shadow-[0_0_15px_rgba(255,255,255,0.2)] animate-enter">
                THE TEAM
            </h2>
            <div class="flex flex-wrap justify-center gap-6">
                <!-- Owner Card -->
                <div class="bg-white/5 border border-white/10 p-8 rounded-2xl flex flex-col items-center w-64 hover:bg-white/10 transition-all duration-300 hover:-translate-y-1 animate-enter delay-100 shadow-[0_0_15px_rgba(255,255,255,0.02)] hover:shadow-[0_0_25px_rgba(255,255,255,0.1)]">
                    <h3 class="text-2xl font-bold text-white mb-2">proximate</h3>
                    <p class="text-gray-400 text-sm font-bold tracking-wide uppercase">Owner of menu</p>
                </div>
                <!-- Developer Card -->
                <div class="bg-white/5 border border-white/10 p-8 rounded-2xl flex flex-col items-center w-64 hover:bg-white/10 transition-all duration-300 hover:-translate-y-1 animate-enter delay-200 shadow-[0_0_15px_rgba(255,255,255,0.02)] hover:shadow-[0_0_25px_rgba(255,255,255,0.1)]">
                    <h3 class="text-2xl font-bold text-white mb-2">Yellow</h3>
                    <p class="text-gray-400 text-sm font-bold tracking-wide uppercase">Developer for menu</p>
                </div>
            </div>
        </div>

        <!-- INFO VIEW -->
        <div id="view-info" class="view-section hidden flex-col items-center w-full transition-all duration-500 ease-out opacity-0 scale-[0.98] absolute">
            <h2 class="text-4xl md:text-6xl font-extrabold tracking-tighter mb-8 w-full text-white drop-shadow-[0_0_15px_rgba(255,255,255,0.2)] animate-enter">
                FEATURES
            </h2>
            <div class="bg-[#111]/80 backdrop-blur-md border border-white/10 p-8 rounded-2xl text-left max-w-md w-full shadow-[0_0_30px_rgba(0,0,0,0.5)] animate-enter delay-100">
                <ul class="space-y-4 text-gray-300 font-medium">
                    <li class="flex items-center gap-3"><span class="text-white text-xl">✦</span> Fully Undetected</li>
                    <li class="flex items-center gap-3"><span class="text-white text-xl">✦</span> 150+ Custom Mods</li>
                    <li class="flex items-center gap-3"><span class="text-white text-xl">✦</span> Frequent Updates</li>
                    <li class="flex items-center gap-3"><span class="text-white text-xl">✦</span> Clean Custom UI</li>
                </ul>
            </div>
        </div>

    </main>

    <!-- Bottom Navigation Bar -->
    <nav class="absolute bottom-8 z-20">
        <div class="flex items-center gap-2 bg-[#111]/80 backdrop-blur-md p-2 rounded-2xl border border-white/10 shadow-[0_4px_30px_rgba(0,0,0,0.5)] animate-enter delay-300">
            <button id="btn-devs" onclick="switchView('devs')" title="Developers" class="nav-btn group relative p-3 rounded-xl transition-all duration-300 hover:bg-white/10 active:scale-90 text-gray-500 hover:text-white border border-transparent">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="transition-transform duration-300 group-hover:scale-110">
                    <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
                    <circle cx="9" cy="7" r="4"></circle>
                    <path d="M22 21v-2a4 4 0 0 0-3-3.87"></path>
                    <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                </svg>
            </button>
            <button id="btn-home" onclick="switchView('home')" title="Home" class="nav-btn group relative p-3 rounded-xl transition-all duration-300 active:scale-90 bg-white text-black border border-white/30 shadow-[0_0_15px_rgba(255,255,255,0.3)]">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="transition-transform duration-300 group-hover:scale-110">
                    <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
            </button>
            <button id="btn-info" onclick="switchView('info')" title="More Info" class="nav-btn group relative p-3 rounded-xl transition-all duration-300 hover:bg-white/10 active:scale-90 text-gray-500 hover:text-white border border-transparent">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="transition-transform duration-300 group-hover:scale-110">
                    <circle cx="12" cy="12" r="10"></circle>
                    <path d="M12 16v-4"></path>
                    <path d="M12 8h.01"></path>
                </svg>
            </button>
        </div>
    </nav>

    <script>
        let isAnimating = false;
        function switchView(targetView) {
            if (isAnimating) return;
            isAnimating = true;

            const buttons = document.querySelectorAll('.nav-btn');
            const activeClasses = ['bg-white', 'text-black', 'border-white/30', 'shadow-[0_0_15px_rgba(255,255,255,0.3)]'];
            const inactiveClasses = ['hover:bg-white/10', 'text-gray-500', 'hover:text-white', 'border-transparent'];

            buttons.forEach(btn => {
                if (btn.id === `btn-${targetView}`) {
                    btn.classList.remove(...inactiveClasses);
                    btn.classList.add(...activeClasses);
                } else {
                    btn.classList.remove(...activeClasses);
                    btn.classList.add(...inactiveClasses);
                }
            });

            const views = document.querySelectorAll('.view-section');
            views.forEach(view => {
                if (view.id !== `view-${targetView}` && !view.classList.contains('hidden')) {
                    view.classList.remove('opacity-100', 'scale-100');
                    view.classList.add('opacity-0', 'scale-[0.98]');
                    setTimeout(() => {
                        view.classList.remove('flex');
                        view.classList.add('hidden', 'absolute');
                    }, 400); 
                }
            });

            setTimeout(() => {
                const newView = document.getElementById(`view-${targetView}`);
                if (newView) {
                    newView.classList.remove('hidden', 'absolute');
                    newView.classList.add('flex');
                    requestAnimationFrame(() => {
                        newView.classList.remove('opacity-0', 'scale-[0.98]');
                        newView.classList.add('opacity-100', 'scale-100');
                        setTimeout(() => { isAnimating = false; }, 400);
                    });
                } else {
                    isAnimating = false;
                }
            }, 400);
        }
    </script>
</body>
</html>
